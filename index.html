<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latamro — Explorador de Ovals</title>
<style>
:root{--bg:#0e0e12;--surface:#16161d;--surface2:#1e1e27;--border:#2a2a38;--border2:#3a3a50;--text:#e8e8f0;--muted:#888899;--accent:#7c6af7;--accent2:#5e52cc;--radius:10px;--radius-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-size:17px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--muted);margin-top:1px}
.lang-switcher{display:flex;gap:5px}
.lang-btn{padding:4px 11px;font-size:12px;font-weight:600;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.lang-btn:hover{border-color:var(--accent);color:var(--text)}
.lang-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.container{max-width:1200px;margin:0 auto;padding:24px 20px}
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:20px;width:fit-content}
.tab-btn{padding:7px 20px;font-size:14px;font-weight:500;border:none;border-radius:7px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:var(--accent);color:#fff}
.search-wrap{position:relative;display:inline-block;width:100%;max-width:460px;margin-bottom:18px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.search-bar{width:100%;padding:9px 14px 9px 36px;font-size:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:border-color .15s}
.search-bar:focus{border-color:var(--accent)}
.oval-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;margin-bottom:6px}
.oval-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:border-color .15s,transform .1s}
.oval-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.oval-card-name{font-size:14px;font-weight:600;margin-bottom:5px}
.oval-card-count{font-size:12px;color:var(--muted)}
.oval-card-badge{display:inline-block;margin-top:7px;font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 8px;border-radius:999px;background:rgba(124,106,247,.15);color:var(--accent)}
.detail-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.back-btn{display:flex;align-items:center;gap:5px;padding:6px 13px;font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--border2);color:var(--text)}
.detail-title{font-size:20px;font-weight:700}
.stats-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 18px;min-width:110px}
.stat-value{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.legend-label{font-size:12px;color:var(--muted);margin-right:3px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface2);padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:9px 14px;font-size:13px}
.prob{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
.prob-ultra{background:rgba(247,201,72,.15);color:#f7c948}
.prob-rare{background:rgba(124,106,247,.15);color:#a89fff}
.prob-mid{background:rgba(78,201,148,.15);color:#4ec994}
.prob-always{background:rgba(224,92,92,.15);color:#e05c5c}
.oval-tags{display:flex;flex-wrap:wrap;gap:5px}
.oval-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:2px 9px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.oval-tag .prob{font-size:10px;padding:1px 5px}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:14px}
.hidden{display:none!important}
@media(max-width:600px){header{padding:12px 14px}.container{padding:14px 10px}.oval-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🎯</div>
    <div>
      <div class="logo-text">Latamro Ovals</div>
      <div class="logo-sub" id="hdr-sub">Explorador de drops</div>
    </div>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('es')">ES</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('pt')">PT</button>
  </div>
</header>
<div class="container">
  <div class="stats-row" id="stats-row"></div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-ovals" onclick="switchTab('ovals')" data-t="tabOvals">Por Oval</button>
    <button class="tab-btn" id="tab-items" onclick="switchTab('items')" data-t="tabItems">Por Item</button>
  </div>
  <div id="panel-ovals">
    <div id="oval-list-view">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-bar" id="search-ovals" type="text" oninput="renderOvalGrid()" data-ph="searchOval" placeholder="Buscar oval..."/>
      </div>
      <div class="oval-grid" id="oval-grid"></div>
    </div>
    <div id="oval-detail-view" class="hidden">
      <div class="detail-header">
        <button class="back-btn" onclick="goBack()">← <span data-t="back">Volver</span></button>
        <div class="detail-title" id="detail-oval-name"></div>
      </div>
      <div class="legend">
        <span class="legend-label" data-t="rarity">Rareza:</span>
        <span class="legend-item"><span class="prob prob-ultra">≤ 0.1%</span> <span data-t="ultra">Ultra raro</span></span>
        <span class="legend-item"><span class="prob prob-rare">≤ 1%</span> <span data-t="raro">Raro</span></span>
        <span class="legend-item"><span class="prob prob-mid">≤ 50%</span> <span data-t="mid">Común</span></span>
        <span class="legend-item"><span class="prob prob-always">100%</span> <span data-t="always">Siempre</span></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th data-t="thItem">Item</th>
            <th style="text-align:center" data-t="thQty">Cant.</th>
            <th style="text-align:right" data-t="thProb">Probabilidad</th>
          </tr></thead>
          <tbody id="detail-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div id="panel-items" class="hidden">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-bar" id="search-items" type="text" oninput="renderItemsList()" data-ph="searchItem" placeholder="Buscar item..."/>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th data-t="thItem">Item</th>
          <th data-t="thFoundIn">Aparece en</th>
        </tr></thead>
        <tbody id="items-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

let lang='es',currentTab='ovals',currentOval=null;

function pc(p){if(p<=0.1)return'prob-ultra';if(p<=1)return'prob-rare';if(p<100)return'prob-mid';return'prob-always';}
function pf(p){if(p>=100)return'100%';if(p<0.1)return p.toFixed(4)+'%';if(p<1)return p.toFixed(3)+'%';return p.toFixed(2)+'%';}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  document.getElementById('hdr-sub').textContent=T[l].sub;
  document.querySelectorAll('[data-t]').forEach(el=>{const k=el.getAttribute('data-t');if(T[l][k])el.textContent=T[l][k];});
  document.querySelectorAll('[data-ph]').forEach(el=>{const k=el.getAttribute('data-ph');if(T[l][k])el.placeholder=T[l][k];});
  refresh();
}
function switchTab(t){
  currentTab=t;currentOval=null;
  document.getElementById('tab-ovals').classList.toggle('active',t==='ovals');
  document.getElementById('tab-items').classList.toggle('active',t==='items');
  document.getElementById('panel-ovals').classList.toggle('hidden',t!=='ovals');
  document.getElementById('panel-items').classList.toggle('hidden',t!=='items');
  refresh();
}
function refresh(){renderStats();if(currentTab==='ovals')renderOvalGrid();else renderItemsList();}
function renderStats(){
  const ovals=Object.keys(DATA);
  const allItems=new Set();let total=0;
  ovals.forEach(o=>{DATA[o].forEach(it=>{allItems.add(it.n);total++;});});
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-value">${ovals.length}</div><div class="stat-label">${T[lang].statOvals}</div></div>
    <div class="stat-card"><div class="stat-value">${allItems.size}</div><div class="stat-label">${T[lang].statItems}</div></div>
    <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">${T[lang].statDrops}</div></div>`;
}
function renderOvalGrid(){
  const q=(document.getElementById('search-ovals').value||'').toLowerCase();
  if(currentOval){
    document.getElementById('oval-list-view').classList.add('hidden');
    document.getElementById('oval-detail-view').classList.remove('hidden');
    document.getElementById('detail-oval-name').textContent=currentOval;
    const items=[...DATA[currentOval]].sort((a,b)=>a.p-b.p);
    document.getElementById('detail-tbody').innerHTML=items.map(it=>`<tr><td style="font-weight:500">${it.n}</td><td style="text-align:center;color:var(--muted)">${it.q}</td><td style="text-align:right"><span class="prob ${pc(it.p)}">${pf(it.p)}</span></td></tr>`).join('');
    return;
  }
  document.getElementById('oval-list-view').classList.remove('hidden');
  document.getElementById('oval-detail-view').classList.add('hidden');
  const filtered=Object.keys(DATA).filter(o=>o.toLowerCase().includes(q));
  const grid=document.getElementById('oval-grid');
  if(!filtered.length){grid.innerHTML=`<div class="empty">${T[lang].noResults}</div>`;return;}
  grid.innerHTML=filtered.map(o=>`<div class="oval-card" onclick="openOval('${o}')"><div class="oval-card-name">${o}</div><div class="oval-card-count">${DATA[o].length} items</div><div class="oval-card-badge">VER DROPS →</div></div>`).join('');
}
function openOval(name){currentOval=name;renderOvalGrid();}
function goBack(){currentOval=null;renderOvalGrid();}
function renderItemsList(){
  const q=(document.getElementById('search-items').value||'').toLowerCase();
  const map={};
  Object.keys(DATA).forEach(oval=>{DATA[oval].forEach(it=>{if(!map[it.n])map[it.n]=[];map[it.n].push({oval,q:it.q,p:it.p});});});
  const keys=Object.keys(map).sort().filter(k=>k.toLowerCase().includes(q));
  const tbody=document.getElementById('items-tbody');
  if(!keys.length){tbody.innerHTML=`<tr><td colspan="2" style="text-align:center;padding:32px;color:var(--muted)">${T[lang].noResults}</td></tr>`;return;}
  tbody.innerHTML=keys.map(name=>{
    const entries=map[name];
    const tags=entries.map(e=>`<span class="oval-tag">${e.oval}<span class="prob ${pc(e.p)}">${pf(e.p)}</span></span>`).join('');
    return`<tr><td style="font-weight:500">${name}</td><td><div class="oval-tags">${tags}</div></td></tr>`;
  }).join('');
}
refresh();
